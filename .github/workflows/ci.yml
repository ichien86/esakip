name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm run test

    - name: Build Application (Dry Run)
      run: npm run build
      env:
        # Kita menggunakan variabel dummy untuk build test jika diperlukan
        MONGODB_URI: "mongodb://localhost:27017/esakip_test"
        JWT_SECRET: "test_secret_key_for_build"
